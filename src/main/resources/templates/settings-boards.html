<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{settings.title}">AI Assistant — Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- Header -->
<header class="h-14 border-b border-zinc-800/80 flex items-center px-6 gap-4 shrink-0" style="background:#0c0c0f;">
    <a href="/settings" class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        <span class="text-sm" th:text="#{settings.back}">Back to Settings</span>
    </a>
    <span class="text-zinc-700">|</span>
    <span class="text-zinc-300 text-sm font-medium" th:text="#{settings.nav.boards}">Boards</span>
</header>

<!-- Main -->
<main class="flex-1 flex flex-col items-center px-6 py-10">
    <div class="w-full max-w-2xl flex flex-col gap-6">

        <!-- Add column form -->
        <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl p-5">
            <p class="text-sm font-medium text-zinc-300 mb-4" th:text="#{settings.boards.create_heading}">Add Column</p>
            <form th:action="@{/settings/boards/new}" method="post" class="flex gap-2">
                <input name="name" type="text" required
                       th:placeholder="#{settings.boards.field.name}"
                       class="flex-1 bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
                <button type="submit"
                        class="shrink-0 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
                        th:text="#{settings.boards.button.add}">Add</button>
            </form>
        </div>

        <!-- Columns list -->
        <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl overflow-hidden">
            <div class="px-5 py-3 border-b border-zinc-800/60">
                <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest" style="font-family:'JetBrains Mono',monospace;"
                   th:text="#{settings.boards.columns_heading}">Columns</p>
            </div>

            <div th:each="col, stat : ${columns}"
                 class="group flex items-center gap-3 px-5 py-3 border-b border-zinc-800/40 last:border-0 hover:bg-zinc-800/20 transition-colors">

                <!-- Order indicator -->
                <span class="text-xs text-zinc-600 w-5 text-right shrink-0"
                      th:text="${stat.index + 1}">1</span>

                <!-- Column name -->
                <span class="flex-1 text-sm text-zinc-200" th:text="${col.name}">Column</span>

                <!-- Up / Down / Delete -->
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">

                    <!-- Up -->
                    <form th:action="@{/settings/boards/{id}/up(id=${col.id})}" method="post">
                        <button type="submit"
                                th:disabled="${stat.first}"
                                class="p-1.5 rounded-lg text-zinc-500 hover:text-zinc-200 hover:bg-zinc-700/50 transition-all disabled:opacity-30 disabled:pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/>
                            </svg>
                        </button>
                    </form>

                    <!-- Down -->
                    <form th:action="@{/settings/boards/{id}/down(id=${col.id})}" method="post">
                        <button type="submit"
                                th:disabled="${stat.last}"
                                class="p-1.5 rounded-lg text-zinc-500 hover:text-zinc-200 hover:bg-zinc-700/50 transition-all disabled:opacity-30 disabled:pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                            </svg>
                        </button>
                    </form>

                    <!-- Delete -->
                    <form th:action="@{/settings/boards/{id}/delete(id=${col.id})}" method="post"
                          th:attr="onsubmit=|return confirm('#{settings.boards.delete.confirm}')|">
                        <button type="submit"
                                class="p-1.5 rounded-lg text-zinc-600 hover:text-red-400 hover:bg-red-500/5 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Empty -->
            <div th:if="${#lists.isEmpty(columns)}"
                 class="px-5 py-8 text-center text-zinc-600 text-sm"
                 th:text="#{settings.boards.columns_empty}">No columns yet.</div>
        </div>

    </div>
</main>

</body>
</html>
