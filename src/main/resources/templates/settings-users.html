<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{settings.title}">AI Assistant — Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .anim-empty { animation: fadeInUp 0.35s ease both; }
    </style>
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideDeleteModal()"></div>
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <h3 class="text-zinc-100 font-medium mb-1.5" th:text="#{settings.users.delete.confirm}">Delete user?</h3>
        <p class="text-zinc-500 text-sm mb-5" th:text="#{settings.users.delete.message}">This action cannot be undone.</p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="hideDeleteModal()"
                    class="px-4 py-2 text-sm text-zinc-400 hover:text-zinc-200 transition-colors"
                    th:text="#{settings.button.cancel}">Cancel</button>
            <button type="button" onclick="confirmDelete()"
                    class="bg-red-600 hover:bg-red-500 active:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors shadow-md shadow-red-950/40"
                    th:text="#{settings.button.confirm}">Confirm</button>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div id="createModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideCreateModal()"></div>
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <h3 class="text-zinc-100 font-medium mb-5" th:text="#{settings.users.create_heading}">Create User</h3>
        <div id="createError" class="hidden mb-4 px-3 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>
        <form id="createForm" th:action="@{/settings/users/new}" method="post" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-zinc-400" th:text="#{settings.users.field.username}">Username</label>
                <input id="createUsername" name="username" type="text" required placeholder="jane.smith"
                       class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-zinc-400" th:text="#{settings.users.field.role}">Role</label>
                <select name="role"
                        class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all">
                    <option value="USER" th:text="#{settings.role.user}">User</option>
                    <option value="ADMIN" th:text="#{settings.role.admin}">Admin</option>
                </select>
            </div>
            <div class="flex gap-3 justify-end pt-1">
                <button type="button" onclick="hideCreateModal()"
                        class="px-4 py-2 text-sm text-zinc-400 hover:text-zinc-200 transition-colors"
                        th:text="#{settings.button.cancel}">Cancel</button>
                <button type="submit"
                        class="bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors shadow-md shadow-violet-950/40"
                        th:text="#{settings.button.create_user}">Create</button>
            </div>
        </form>
    </div>
</div>

<!-- Header -->
<header class="h-14 border-b border-zinc-800/80 flex items-center px-6 gap-4 shrink-0" style="background:#0c0c0f;">
    <a href="/settings" class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        <span class="text-sm" th:text="#{settings.back}">Back to Settings</span>
    </a>
    <span class="text-zinc-700">|</span>
    <span class="text-zinc-300 text-sm font-medium" th:text="#{settings.nav.users}">Users</span>
</header>

<!-- Main -->
<main class="flex-1 flex flex-col items-center px-6 py-10">
    <div class="w-full max-w-3xl flex flex-col gap-5">

        <!-- Heading -->
        <p class="text-zinc-100 font-medium" th:text="#{settings.users.heading}">User Management</p>

        <!-- Error banner -->
        <div th:if="${usersError}"
             class="px-3 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"
             th:text="${usersError}"></div>

        <!-- Invite link flash -->
        <div th:if="${inviteLink}" class="bg-zinc-900 border border-violet-500/30 rounded-2xl p-4 flex flex-col gap-2">
            <p class="text-xs text-violet-400 font-medium">
                <span th:text="#{settings.users.invite_link_for}">Invite link for</span>
                <span class="font-mono" th:text="${inviteUsername}"></span>
            </p>
            <div class="flex gap-2 items-center">
                <input id="invite-link-input" type="text" readonly th:value="${inviteLink}"
                       class="flex-1 bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-xs text-zinc-300 font-mono focus:outline-none focus:border-violet-500/60 truncate"/>
                <button type="button" onclick="copyLink('invite-link-input', this)"
                        class="shrink-0 flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700/60 text-zinc-400 hover:text-zinc-200 text-xs font-medium px-3 py-2 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/>
                    </svg>
                    Copy
                </button>
            </div>
        </div>

        <!-- Toolbar: search + actions -->
        <div class="flex items-center gap-2">
            <form id="searchForm" th:action="@{/settings/users}" method="get" class="flex-1">
                <input type="hidden" name="sort" th:value="${sort}"/>
                <input type="hidden" name="dir" th:value="${dir}"/>
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-zinc-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                    </svg>
                    <input id="searchInput" name="q" type="search" th:value="${q}"
                           th:placeholder="#{settings.users.search.placeholder}"
                           oninput="debounceSearch()"
                           class="w-full bg-zinc-900 border border-zinc-800/60 rounded-xl pl-9 pr-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
                </div>
            </form>

            <button type="button" onclick="showCreateModal()"
                    class="shrink-0 flex items-center gap-1.5 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors shadow-md shadow-violet-950/40">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                <span th:text="#{settings.users.create_heading}">Create User</span>
            </button>

            <button id="deleteBtn" type="button" disabled onclick="showDeleteModal(null)"
                    class="shrink-0 flex items-center gap-1.5 text-sm font-medium px-4 py-2.5 rounded-xl border transition-all
                           bg-red-500/10 border-red-500/30 text-red-400 hover:bg-red-500/20 hover:text-red-300
                           disabled:bg-zinc-800/40 disabled:border-zinc-700/30 disabled:text-zinc-600 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                </svg>
                <span id="deleteLabel" th:text="#{settings.button.delete}">Delete</span>
            </button>
        </div>

        <!-- User table -->
        <form id="usersForm" th:action="@{/settings/users/delete}" method="post">
        <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl overflow-hidden">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-zinc-800/60">
                        <th class="w-10 px-5 py-3">
                            <input type="checkbox" id="selectAll" onchange="toggleAll(this)"
                                   class="w-3.5 h-3.5 rounded border-zinc-600 bg-zinc-800 accent-violet-500 cursor-pointer"/>
                        </th>
                        <!-- Name -->
                        <th class="px-3 py-3 text-left">
                            <a th:href="@{/settings/users(sort='firstName',dir=${sort == 'firstName' ? (dir == 'asc' ? 'desc' : 'asc') : 'asc'},q=${q},page=0)}"
                               class="inline-flex items-center gap-1 text-xs font-medium text-zinc-500 uppercase tracking-widest hover:text-zinc-300 transition-colors"
                               style="font-family:'JetBrains Mono',monospace;">
                                <span th:text="#{settings.table.name}">Name</span>
                                <span th:if="${sort == 'firstName' and dir == 'asc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
                                </span>
                                <span th:if="${sort == 'firstName' and dir == 'desc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                                </span>
                            </a>
                        </th>
                        <!-- Username -->
                        <th class="px-3 py-3 text-left">
                            <a th:href="@{/settings/users(sort='username',dir=${sort == 'username' ? (dir == 'asc' ? 'desc' : 'asc') : 'asc'},q=${q},page=0)}"
                               class="inline-flex items-center gap-1 text-xs font-medium text-zinc-500 uppercase tracking-widest hover:text-zinc-300 transition-colors"
                               style="font-family:'JetBrains Mono',monospace;">
                                <span th:text="#{settings.table.username}">Username</span>
                                <span th:if="${sort == 'username' and dir == 'asc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
                                </span>
                                <span th:if="${sort == 'username' and dir == 'desc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                                </span>
                            </a>
                        </th>
                        <!-- Role -->
                        <th class="px-3 py-3 text-left">
                            <a th:href="@{/settings/users(sort='role',dir=${sort == 'role' ? (dir == 'asc' ? 'desc' : 'asc') : 'asc'},q=${q},page=0)}"
                               class="inline-flex items-center gap-1 text-xs font-medium text-zinc-500 uppercase tracking-widest hover:text-zinc-300 transition-colors"
                               style="font-family:'JetBrains Mono',monospace;">
                                <span th:text="#{settings.table.role}">Role</span>
                                <span th:if="${sort == 'role' and dir == 'asc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
                                </span>
                                <span th:if="${sort == 'role' and dir == 'desc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                                </span>
                            </a>
                        </th>
                        <!-- Status -->
                        <th class="px-3 py-3 text-left text-xs font-medium text-zinc-500 uppercase tracking-widest" style="font-family:'JetBrains Mono',monospace;" th:text="#{settings.table.status}">Status</th>
                        <!-- Created -->
                        <th class="px-3 py-3 text-left">
                            <a th:href="@{/settings/users(sort='createdAt',dir=${sort == 'createdAt' ? (dir == 'asc' ? 'desc' : 'asc') : 'desc'},q=${q},page=0)}"
                               class="inline-flex items-center gap-1 text-xs font-medium text-zinc-500 uppercase tracking-widest hover:text-zinc-300 transition-colors"
                               style="font-family:'JetBrains Mono',monospace;">
                                <span>Created</span>
                                <span th:if="${sort == 'createdAt' and dir == 'asc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
                                </span>
                                <span th:if="${sort == 'createdAt' and dir == 'desc'}" class="text-violet-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                                </span>
                            </a>
                        </th>
                        <th class="w-10 px-3 py-3"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}" class="group border-b border-zinc-800/40 last:border-0 hover:bg-zinc-800/30 transition-colors">
                        <td class="px-5 py-3">
                            <input type="checkbox" name="ids" th:value="${u.id}"
                                   class="row-check w-3.5 h-3.5 rounded border-zinc-600 bg-zinc-800 accent-violet-500 cursor-pointer"
                                   onchange="updateSelection()"/>
                        </td>
                        <td class="px-3 py-3 text-zinc-300 text-xs">
                            <span th:if="${u.firstName != null}" th:text="${u.firstName + ' ' + (u.lastName ?: '')}"></span>
                            <span th:unless="${u.firstName != null}" class="text-zinc-600">—</span>
                        </td>
                        <td class="px-3 py-3 text-zinc-200 font-mono text-xs" th:text="${u.username}"></td>
                        <td class="px-3 py-3">
                            <span th:if="${u.role.name() == 'ADMIN'}"
                                  class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-violet-500/15 text-violet-300 border border-violet-500/25"
                                  th:text="#{settings.role.admin}">Admin</span>
                            <span th:unless="${u.role.name() == 'ADMIN'}"
                                  class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-zinc-700/50 text-zinc-400 border border-zinc-600/30"
                                  th:text="#{settings.role.user}">User</span>
                        </td>
                        <td class="px-3 py-3">
                            <div th:if="${u.inviteToken != null}" class="flex items-center gap-2">
                                <span class="inline-flex items-center gap-1.5 text-xs text-amber-400">
                                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                                    <span th:text="#{settings.status.pending}">Pending</span>
                                </span>
                                <button type="button"
                                        th:data-token="${u.inviteToken}"
                                        onclick="copyInviteToken(this)"
                                        title="Copy invite link"
                                        class="text-zinc-600 hover:text-zinc-300 transition-colors p-0.5 rounded">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/>
                                    </svg>
                                </button>
                            </div>
                            <span th:if="${u.inviteToken == null and u.enabled}" class="inline-flex items-center gap-1.5 text-xs text-emerald-400">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                                <span th:text="#{settings.status.active}">Active</span>
                            </span>
                            <span th:if="${u.inviteToken == null and !u.enabled}" class="inline-flex items-center gap-1.5 text-xs text-zinc-500">
                                <span class="w-1.5 h-1.5 rounded-full bg-zinc-600"></span>
                                <span th:text="#{settings.status.disabled}">Disabled</span>
                            </span>
                        </td>
                        <td class="px-3 py-3 text-zinc-500 text-xs font-mono"
                            th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'MMM d, yyyy') : '—'}"></td>
                        <td class="px-3 py-3 text-right">
                            <button th:if="${u.username != currentUsername}"
                                    type="button"
                                    th:data-action="@{/settings/users/{id}/delete(id=${u.id})}"
                                    onclick="showDeleteModal(this)"
                                    class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition-all p-1 rounded">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                                </svg>
                            </button>
                        </td>
                    </tr>

                    <!-- Empty state -->
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" class="py-16 text-center">
                            <div class="anim-empty flex flex-col items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-zinc-800/80 border border-zinc-700/40 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                                    </svg>
                                </div>
                                <p class="text-zinc-600 text-sm" th:text="#{settings.users.empty}">No users.</p>
                                <p th:if="${q != null and !q.isEmpty()}" class="text-zinc-700 text-xs">No results for "<span th:text="${q}" class="text-zinc-500"></span>"</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div th:if="${usersPage.totalPages > 1}"
                 class="flex items-center justify-between px-5 py-3 border-t border-zinc-800/60">
                <span class="text-xs text-zinc-600"
                      th:text="${usersPage.number * usersPage.size + 1} + '–' + ${usersPage.number * usersPage.size + usersPage.numberOfElements} + ' / ' + ${usersPage.totalElements}"></span>
                <div class="flex gap-1">
                    <a th:if="${!usersPage.first}"
                       th:href="@{/settings/users(page=${usersPage.number - 1},q=${q},sort=${sort},dir=${dir})}"
                       class="flex items-center gap-1 px-3 py-1.5 text-xs text-zinc-400 hover:text-zinc-200 bg-zinc-800/60 hover:bg-zinc-700/60 border border-zinc-700/50 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                        </svg>
                        Prev
                    </a>
                    <a th:if="${!usersPage.last}"
                       th:href="@{/settings/users(page=${usersPage.number + 1},q=${q},sort=${sort},dir=${dir})}"
                       class="flex items-center gap-1 px-3 py-1.5 text-xs text-zinc-400 hover:text-zinc-200 bg-zinc-800/60 hover:bg-zinc-700/60 border border-zinc-700/50 rounded-lg transition-colors">
                        Next
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
        </form>

    </div>
</main>

<script th:inline="javascript">
    const LABEL_DELETE = /*[[#{settings.button.delete}]]*/ 'Delete';

    // ── Delete modal ────────────────────────────────────────
    let pendingDeleteAction = null;

    function showDeleteModal(btn) {
        pendingDeleteAction = btn ? btn.dataset.action : null;
        document.getElementById('deleteModal').classList.remove('hidden');
    }

    function hideDeleteModal() {
        document.getElementById('deleteModal').classList.add('hidden');
        pendingDeleteAction = null;
    }

    function confirmDelete() {
        const form = document.getElementById('usersForm');
        form.action = pendingDeleteAction || /*[[@{/settings/users/delete}]]*/ '/settings/users/delete';
        hideDeleteModal();
        form.submit();
    }

    // ── Create modal ────────────────────────────────────────
    function showCreateModal() {
        document.getElementById('createModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('createUsername').focus(), 50);
    }

    function hideCreateModal() {
        document.getElementById('createModal').classList.add('hidden');
        document.getElementById('createForm').reset();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { hideDeleteModal(); hideCreateModal(); }
    });

    // ── Real-time search ────────────────────────────────────
    let searchTimer;
    function debounceSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => document.getElementById('searchForm').submit(), 350);
    }

    // ── Bulk selection ──────────────────────────────────────
    function updateSelection() {
        const checked = document.querySelectorAll('.row-check:checked');
        const all = document.querySelectorAll('.row-check');
        const selectAll = document.getElementById('selectAll');
        const deleteBtn = document.getElementById('deleteBtn');
        const n = checked.length;

        selectAll.indeterminate = n > 0 && n < all.length;
        selectAll.checked = all.length > 0 && n === all.length;

        deleteBtn.disabled = n === 0;
        document.getElementById('deleteLabel').textContent = n > 0 ? `${LABEL_DELETE} (${n})` : LABEL_DELETE;
    }

    function toggleAll(cb) {
        document.querySelectorAll('.row-check').forEach(el => { el.checked = cb.checked; });
        updateSelection();
    }

    // ── Clipboard helpers ───────────────────────────────────
    function copyInviteToken(btn) {
        const link = window.location.origin + '/invite/' + btn.dataset.token;
        navigator.clipboard.writeText(link).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
            setTimeout(() => { btn.innerHTML = original; }, 1500);
        });
    }

    function copyLink(inputId, btn) {
        navigator.clipboard.writeText(document.getElementById(inputId).value).then(() => {
            const orig = btn.textContent.trim();
            btn.textContent = 'Copied!';
            btn.classList.add('text-emerald-400');
            setTimeout(() => {
                btn.textContent = orig;
                btn.classList.remove('text-emerald-400');
            }, 1500);
        });
    }
</script>

</body>
</html>
