<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 h-screen overflow-hidden" style="font-family:'Outfit',sans-serif;">
<div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 flex flex-col shrink-0 border-r border-zinc-800/80" style="background:#0c0c0f;">

        <!-- Logo -->
        <div class="px-4 py-5 border-b border-zinc-800/80">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
                    </svg>
                </div>
                <span class="text-zinc-100 font-semibold tracking-tight text-sm" style="font-family:'JetBrains Mono',monospace;">AI Assistant</span>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 p-2">
            <p class="px-2 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-widest mb-1" style="font-family:'JetBrains Mono',monospace;">Admin</p>
            <ul class="space-y-0.5">
                <li>
                    <a href="/admin"
                       class="flex items-center gap-2.5 rounded-lg px-3 py-2.5 bg-violet-600/10 border border-violet-500/25 text-sm text-zinc-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="/admin/users"
                       class="flex items-center gap-2.5 rounded-lg px-3 py-2.5 hover:bg-zinc-800/60 border border-transparent text-sm text-zinc-400 hover:text-zinc-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
                        </svg>
                        Users
                    </a>
                </li>
                <li>
                    <a href="/"
                       class="flex items-center gap-2.5 rounded-lg px-3 py-2.5 hover:bg-zinc-800/60 border border-transparent text-sm text-zinc-400 hover:text-zinc-200 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                        </svg>
                        Chats
                    </a>
                </li>
            </ul>
        </nav>

        <!-- User / logout -->
        <div class="p-3 border-t border-zinc-800/80">
            <div class="flex items-center justify-between px-2 py-1.5">
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-6 h-6 rounded-full bg-violet-600/30 border border-violet-500/30 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-violet-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                    </div>
                    <span class="text-xs text-zinc-400 truncate" sec:authentication="name">admin</span>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="text-zinc-600 hover:text-zinc-300 transition-colors p-1 rounded" title="Sign out">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto bg-zinc-950 p-8">
        <h2 class="text-zinc-100 font-semibold text-lg mb-1">Dashboard</h2>
        <p class="text-zinc-500 text-sm mb-8">Welcome to the admin panel.</p>

        <div class="grid grid-cols-2 gap-4 max-w-lg">
            <a href="/"
               class="flex flex-col gap-3 p-5 bg-zinc-900 border border-zinc-800/60 rounded-2xl hover:border-violet-500/30 hover:bg-zinc-800/60 transition-all group">
                <div class="w-9 h-9 rounded-lg bg-zinc-800 border border-zinc-700/50 group-hover:bg-violet-600/15 group-hover:border-violet-500/30 flex items-center justify-center transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5 text-zinc-400 group-hover:text-violet-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-zinc-200 text-sm font-medium">Chats</p>
                    <p class="text-zinc-600 text-xs mt-0.5">Open chat interface</p>
                </div>
            </a>
            <a href="/admin/users"
               class="flex flex-col gap-3 p-5 bg-zinc-900 border border-zinc-800/60 rounded-2xl hover:border-violet-500/30 hover:bg-zinc-800/60 transition-all group">
                <div class="w-9 h-9 rounded-lg bg-zinc-800 border border-zinc-700/50 group-hover:bg-violet-600/15 group-hover:border-violet-500/30 flex items-center justify-center transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5 text-zinc-400 group-hover:text-violet-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-zinc-200 text-sm font-medium">Users</p>
                    <p class="text-zinc-600 text-xs mt-0.5">Manage accounts</p>
                </div>
            </a>
        </div>
    </main>

</div>
</body>
</html>
