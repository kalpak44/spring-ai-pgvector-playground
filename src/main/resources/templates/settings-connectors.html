<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{settings.title}">AI Assistant — Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- Header -->
<header class="h-14 border-b border-zinc-800/80 flex items-center px-6 gap-4 shrink-0" style="background:#0c0c0f;">
    <a href="/settings" class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        <span class="text-sm" th:text="#{settings.back}">Back to Settings</span>
    </a>
    <span class="text-zinc-700">|</span>
    <span class="text-zinc-300 text-sm font-medium" th:text="#{settings.nav.connectors}">Connectors</span>
</header>

<!-- Main -->
<main class="flex-1 flex flex-col items-center px-6 py-10">
    <div class="w-full max-w-lg flex flex-col gap-5">

        <p class="text-zinc-100 font-medium" th:text="#{settings.nav.connectors}">Connectors</p>

        <div th:if="${connectorsSuccess}" class="px-3 py-2.5 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm" th:text="${connectorsSuccess}"></div>
        <div th:if="${connectorsError}" class="px-3 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm" th:text="${connectorsError}"></div>

        <!-- Google connector -->
        <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl p-5">
            <div class="flex items-start gap-4">

                <!-- Google logo -->
                <div class="shrink-0 w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm">
                    <svg viewBox="0 0 24 24" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2.5 mb-1">
                        <span class="text-zinc-100 font-medium text-sm" th:text="#{settings.connectors.google.name}">Google</span>
                        <!-- Connected with all scopes -->
                        <span th:if="${googleConnected and googleScopesOk}"
                              class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-500/15 text-emerald-400 border border-emerald-500/25">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                            <span th:text="#{settings.connectors.status.connected}">Connected</span>
                        </span>
                        <!-- Connected but missing scopes -->
                        <span th:if="${googleConnected and !googleScopesOk}"
                              class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-amber-500/15 text-amber-400 border border-amber-500/25">
                            <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                            <span th:text="#{settings.connectors.status.permissions_missing}">Permissions missing</span>
                        </span>
                        <!-- Not connected -->
                        <span th:unless="${googleConnected}"
                              class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-zinc-700/50 text-zinc-400 border border-zinc-600/30">
                            <span class="w-1.5 h-1.5 rounded-full bg-zinc-500"></span>
                            <span th:text="#{settings.connectors.status.not_connected}">Not connected</span>
                        </span>
                    </div>

                    <p class="text-zinc-500 text-xs" th:text="#{settings.connectors.google.desc}">Gmail and Google Calendar</p>
                    <p th:if="${googleEmail}" class="text-zinc-400 text-xs font-mono mt-0.5" th:text="${googleEmail}"></p>

                    <!-- Scope warning -->
                    <div th:if="${googleConnected and !googleScopesOk}"
                         class="mt-2 mb-1 px-3 py-2 rounded-lg bg-amber-500/10 border border-amber-500/25 text-amber-400 text-xs"
                         th:text="#{settings.connectors.google.scopes_warning}">
                        Missing required permissions. Please reconnect to grant access to Gmail and Calendar.
                    </div>

                    <!-- Scopes -->
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-zinc-800/80 border border-zinc-700/50 text-zinc-400 text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
                            </svg>
                            <span th:text="#{settings.connectors.scope.gmail}">Gmail (read &amp; write)</span>
                        </span>
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-zinc-800/80 border border-zinc-700/50 text-zinc-400 text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 9v7.5"/>
                            </svg>
                            <span th:text="#{settings.connectors.scope.calendar}">Google Calendar (read &amp; write)</span>
                        </span>
                    </div>

                    <!-- Actions -->
                    <div class="flex items-center gap-2 mt-3">
                        <!-- Not connected: Connect -->
                        <a th:unless="${googleConnected}"
                           href="/settings/connectors/google/connect"
                           class="inline-flex items-center gap-1.5 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-xs font-medium px-3.5 py-2 rounded-lg transition-colors shadow-md shadow-violet-950/40">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/>
                            </svg>
                            <span th:text="#{settings.connectors.action.connect}">Connect with Google</span>
                        </a>
                        <!-- Connected but scopes missing: Reconnect -->
                        <a th:if="${googleConnected and !googleScopesOk}"
                           href="/settings/connectors/google/connect"
                           class="inline-flex items-center gap-1.5 bg-amber-500/15 hover:bg-amber-500/25 border border-amber-500/30 text-amber-400 text-xs font-medium px-3.5 py-2 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
                            </svg>
                            <span th:text="#{settings.connectors.action.reconnect}">Reconnect</span>
                        </a>
                        <!-- Connected: Disconnect -->
                        <form th:if="${googleConnected}" th:action="@{/settings/connectors/google/disconnect}" method="post">
                            <button type="submit"
                                    class="inline-flex items-center gap-1.5 bg-zinc-800 hover:bg-red-500/10 border border-zinc-700/60 hover:border-red-500/40 text-zinc-400 hover:text-red-400 text-xs font-medium px-3.5 py-2 rounded-lg transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.181 8.68a4.503 4.503 0 011.903 6.405m-9.768-3.43a4.5 4.5 0 006.364 6.364l1.757-1.757m-4.596-4.596l4.5-4.5a4.5 4.5 0 00-6.364-6.364l-1.757 1.757"/>
                                </svg>
                                <span th:text="#{settings.connectors.action.disconnect}">Disconnect</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

</body>
</html>
