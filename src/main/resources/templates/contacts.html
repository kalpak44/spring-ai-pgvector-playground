<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{contacts.title}">AI Assistant — Contacts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- Header -->
<header class="h-14 border-b border-zinc-800/80 flex items-center justify-between px-6 shrink-0" style="background:#0c0c0f;">
    <div class="flex items-center gap-4">
        <a href="/apps" class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
            <span class="text-sm" th:text="#{nav.back_to_apps}">Back to Apps</span>
        </a>
        <span class="text-zinc-700">|</span>
        <span class="text-zinc-300 text-sm font-medium" th:text="#{apps.tile.contacts.title}">Contacts</span>
    </div>
    <a href="/settings" class="text-zinc-600 hover:text-zinc-300 transition-colors p-1 rounded" th:title="#{chat.settings_title}">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
    </a>
</header>

<!-- Main -->
<main class="flex-1 flex flex-col items-center px-6 py-10">
    <div class="w-full max-w-3xl flex flex-col gap-5">

        <!-- Search + New -->
        <div class="flex items-center gap-3">
            <form th:action="@{/apps/contacts}" method="get" class="flex-1 relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                </svg>
                <input id="search-input" type="text" name="q" th:value="${q}"
                       th:placeholder="#{contacts.search.placeholder}"
                       autocomplete="off"
                       class="w-full bg-zinc-900 border border-zinc-800/60 rounded-xl pl-9 pr-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/20 transition-all"/>
                <div id="search-dropdown"
                     class="absolute top-full left-0 right-0 mt-1 bg-zinc-900 border border-zinc-800/60 rounded-xl shadow-xl shadow-black/40 z-10 hidden overflow-hidden">
                </div>
            </form>
            <a href="/apps/contacts/new"
               class="shrink-0 flex items-center gap-1.5 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors shadow-md shadow-violet-950/40">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                </svg>
                <span th:text="#{contacts.new_button}">New Contact</span>
            </a>
        </div>

        <!-- Contact table -->
        <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl overflow-hidden">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-zinc-800/60">
                        <th class="text-left px-5 py-3 text-xs font-medium text-zinc-500 uppercase tracking-widest" style="font-family:'JetBrains Mono',monospace;" th:text="#{contacts.table.name}">Name</th>
                        <th class="text-left px-5 py-3 text-xs font-medium text-zinc-500 uppercase tracking-widest hidden sm:table-cell" style="font-family:'JetBrains Mono',monospace;" th:text="#{contacts.table.phone}">Phone</th>
                        <th class="text-left px-5 py-3 text-xs font-medium text-zinc-500 uppercase tracking-widest hidden md:table-cell" style="font-family:'JetBrains Mono',monospace;" th:text="#{contacts.table.email}">Email</th>
                        <th class="text-left px-5 py-3 text-xs font-medium text-zinc-500 uppercase tracking-widest hidden lg:table-cell" style="font-family:'JetBrains Mono',monospace;" th:text="#{contacts.table.updated}">Last Modified</th>
                        <th class="w-10 px-3 py-3"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${contacts.content}"
                        class="group border-b border-zinc-800/40 last:border-0 hover:bg-zinc-800/30 transition-colors">

                        <!-- Name -->
                        <td class="px-5 py-3">
                            <a th:href="@{/apps/contacts/{id}(id=${c.id})}"
                               class="flex items-center gap-2.5 hover:text-violet-300 transition-colors">
                                <div class="w-7 h-7 rounded-full bg-zinc-700 border border-zinc-600/50 flex items-center justify-center shrink-0 text-xs font-medium text-zinc-300"
                                     th:text="${#strings.toUpperCase(#strings.substring(c.firstName ?: c.email ?: '?', 0, 1))}">
                                </div>
                                <span class="text-zinc-200 text-sm" th:text="${c.getDisplayName()}"></span>
                            </a>
                        </td>

                        <!-- Phone -->
                        <td class="px-5 py-3 text-zinc-400 text-xs hidden sm:table-cell">
                            <span th:if="${c.phone != null}" th:text="${c.phone}"></span>
                            <span th:unless="${c.phone != null}" class="text-zinc-700">—</span>
                        </td>

                        <!-- Email -->
                        <td class="px-5 py-3 text-zinc-400 text-xs hidden md:table-cell">
                            <span th:if="${c.email != null}" th:text="${c.email}"></span>
                            <span th:unless="${c.email != null}" class="text-zinc-700">—</span>
                        </td>

                        <!-- Updated -->
                        <td class="px-5 py-3 hidden lg:table-cell">
                            <div th:if="${c.updatedBy != null}" class="flex flex-col gap-0.5">
                                <span class="text-zinc-500 text-xs" th:text="${c.updatedBy}"></span>
                                <span class="text-zinc-600 text-xs" th:text="${#temporals.format(c.updatedAt, 'MMM d, yyyy')}"></span>
                            </div>
                            <span th:unless="${c.updatedBy != null}" class="text-zinc-700 text-xs">—</span>
                        </td>

                        <!-- Delete -->
                        <td class="px-3 py-3 text-right">
                            <form th:action="@{/apps/contacts/{id}/delete(id=${c.id})}" method="post"
                                  th:attr="onsubmit=|return confirm('#{contacts.delete.confirm}')|">
                                <button type="submit"
                                        class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition-all p-1 rounded">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                                    </svg>
                                </button>
                            </form>
                        </td>
                    </tr>

                    <!-- Empty -->
                    <tr th:if="${contacts.totalElements == 0}">
                        <td colspan="5" class="px-5 py-10 text-center text-zinc-600 text-sm" th:text="#{contacts.empty}">No contacts found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${contacts.totalPages > 1}" class="flex items-center justify-center gap-3">
            <a th:if="${contacts.hasPrevious()}"
               th:href="@{/apps/contacts(q=${q},page=${contacts.number - 1})}"
               class="flex items-center gap-1 text-zinc-400 hover:text-zinc-200 text-sm transition-colors px-3 py-1.5 rounded-lg hover:bg-zinc-800/60">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                </svg>
                Prev
            </a>
            <span class="text-zinc-500 text-sm">
                <span th:text="${contacts.number + 1}"></span>
                /
                <span th:text="${contacts.totalPages}"></span>
            </span>
            <a th:if="${contacts.hasNext()}"
               th:href="@{/apps/contacts(q=${q},page=${contacts.number + 1})}"
               class="flex items-center gap-1 text-zinc-400 hover:text-zinc-200 text-sm transition-colors px-3 py-1.5 rounded-lg hover:bg-zinc-800/60">
                Next
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
                </svg>
            </a>
        </div>

        <!-- Count -->
        <p th:if="${contacts.totalElements > 0}" class="text-center text-xs text-zinc-600">
            <span th:text="${contacts.totalElements}"></span> contact<span th:if="${contacts.totalElements != 1}">s</span>
        </p>

    </div>
</main>

<script>
    const searchInput = document.getElementById('search-input');
    const dropdown    = document.getElementById('search-dropdown');
    let debounce;

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    searchInput.addEventListener('input', function () {
        clearTimeout(debounce);
        const q = this.value.trim();
        if (q.length < 2) { dropdown.classList.add('hidden'); return; }
        debounce = setTimeout(async () => {
            try {
                const res  = await fetch('/apps/contacts/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                if (!data.length) { dropdown.classList.add('hidden'); return; }
                dropdown.innerHTML = data.map(c =>
                    `<a href="/apps/contacts/${esc(c.id)}"
                        class="flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 transition-colors cursor-pointer border-b border-zinc-800/60 last:border-0">
                        <div class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center shrink-0 text-xs font-medium text-zinc-300">
                            ${esc((c.name || '?')[0].toUpperCase())}
                        </div>
                        <div class="min-w-0">
                            <div class="text-sm text-zinc-200 truncate">${esc(c.name)}</div>
                            <div class="text-xs text-zinc-500 truncate">${esc(c.email || c.phone || '')}</div>
                        </div>
                    </a>`
                ).join('');
                dropdown.classList.remove('hidden');
            } catch (e) { /* ignore */ }
        }, 180);
    });

    document.addEventListener('click', function (e) {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });

    searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { dropdown.classList.add('hidden'); }
        if (e.key === 'Enter')  { dropdown.classList.add('hidden'); this.form.submit(); }
    });
</script>

</body>
</html>
