<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${chat != null} ? |AI Assistant — ${chat.title}| : #{app.title}">AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/chat.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer th:src="@{/js/chat.js}"></script>
</head>
<body class="bg-zinc-950 h-screen overflow-hidden" style="font-family:'Outfit',sans-serif;">

<!-- Confirmation Modal -->
<div id="confirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideModal()"></div>
    <div class="relative bg-zinc-900 border border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <h3 class="text-zinc-100 font-medium mb-1.5" th:text="#{chat.delete.confirm.title}">Delete chat?</h3>
        <p class="text-zinc-500 text-sm mb-5" th:text="#{chat.delete.confirm.message}">This chat and all its messages will be permanently removed.</p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="hideModal()"
                    class="px-4 py-2 text-sm text-zinc-400 hover:text-zinc-200 transition-colors"
                    th:text="#{settings.button.cancel}">Cancel</button>
            <button type="button" onclick="confirmDelete()"
                    class="bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors shadow-md shadow-violet-950/40"
                    th:text="#{settings.button.confirm}">Confirm</button>
        </div>
    </div>
</div>

<div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside class="w-64 flex flex-col shrink-0 border-r border-zinc-800/80" style="background:#0c0c0f;">

        <!-- Header / logo -->
        <div class="px-4 py-5 border-b border-zinc-800/80">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-900/50 shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
                        </svg>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <span class="text-zinc-100 font-semibold tracking-tight text-sm leading-tight" style="font-family:'JetBrains Mono',monospace;">AI Assistant</span>
                        <a href="/apps" th:text="#{nav.apps}"
                           class="text-violet-500 hover:text-violet-300 text-xs leading-tight transition-colors underline underline-offset-2 decoration-violet-700 hover:decoration-violet-400">More Apps.</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat list -->
        <div class="flex-1 overflow-y-auto min-h-0 p-2 chat-scroll">
            <p class="px-2 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-widest mb-1" style="font-family:'JetBrains Mono',monospace;" th:text="#{chat.nav.chats}">Chats</p>
            <ul class="space-y-0.5">
                <li th:each="c : ${chats}"
                    th:class="${chat != null and chat.id != null and c.id == chat.id} ?
                        'flex items-center justify-between rounded-lg px-3 py-2.5 bg-violet-600/10 border border-violet-500/25 group cursor-pointer' :
                        'flex items-center justify-between rounded-lg px-3 py-2.5 hover:bg-zinc-800/60 border border-transparent group cursor-pointer transition-colors'">
                    <a th:href="@{/chat/{id}(id=${c.id})}"
                       class="flex-1 min-w-0 text-sm text-zinc-300 hover:text-zinc-100 truncate transition-colors">
                        <span th:text="${c.title}">Chat</span>
                    </a>
                    <form th:action="@{/chat/{id}/delete(id=${c.id})}" method="post"
                          class="shrink-0 ml-2">
                        <button type="button" onclick="showDeleteModal(this.closest('form'))"
                                class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition-all p-0.5 rounded">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                            </svg>
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- New chat form + user footer -->
        <div class="p-3 border-t border-zinc-800/80 flex flex-col gap-2">
            <form th:action="@{/chat/new}" method="post" class="flex flex-col gap-2">
                <input type="text" name="title" th:placeholder="#{chat.new_placeholder}" required
                       class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
                <div class="flex gap-2">
                    <button type="submit"
                            class="flex-1 flex items-center justify-center gap-1.5 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-violet-950/40">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                        </svg>
                        <span th:text="#{chat.new_button}">New Chat</span>
                    </button>
                    <a href="/settings" th:title="#{chat.settings_title}"
                       class="flex items-center justify-center w-10 bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 border border-zinc-700/60 text-zinc-400 hover:text-zinc-200 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </a>
                </div>
            </form>
            <!-- User row -->
            <div class="flex items-center justify-between px-1 pt-1">
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-6 h-6 rounded-full bg-zinc-700 border border-zinc-600/50 flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                    </div>
                    <span class="text-xs text-zinc-500 truncate" th:text="${username}">user</span>
                </div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" th:title="#{action.sign_out}" class="text-zinc-600 hover:text-zinc-300 transition-colors p-1 rounded">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </aside>

    <!-- ── Main area ─────────────────────────────────────── -->
    <main class="flex-1 flex flex-col overflow-hidden bg-zinc-950">

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto chat-scroll" id="messages">
            <div id="messages-inner" style="width:100%;padding:1.5rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem;min-height:100%;">

            <!-- No chat selected -->
            <th:block th:if="${chat == null}">
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:5rem;text-align:center;">
                    <div class="w-14 h-14 rounded-2xl bg-zinc-800/80 border border-zinc-700/50 flex items-center justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                        </svg>
                    </div>
                    <p class="text-zinc-500 text-sm" th:text="#{chat.empty_hint}">Select a chat or create a new one to start.</p>
                </div>
            </th:block>

            <!-- History -->
            <th:block th:if="${chat != null}">
                <th:block th:if="${!#lists.isEmpty(chat.history)}">
                    <th:block th:each="entry : ${chat.history}">

                        <!-- User message -->
                        <div th:if="${entry.role.role eq 'user'}" class="flex items-end justify-end gap-2">
                            <div class="max-w-lg bg-violet-700 text-white rounded-2xl rounded-br-sm px-4 py-3 text-sm leading-relaxed shadow-md shadow-violet-950/50 bubble"
                                 th:text="${entry.content}"></div>
                            <div class="w-7 h-7 rounded-full bg-zinc-700 border border-zinc-600/60 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                                </svg>
                            </div>
                        </div>

                        <!-- AI message -->
                        <div th:unless="${entry.role.role eq 'user'}" class="flex items-end gap-2">
                            <div class="w-7 h-7 rounded-full bg-violet-600 flex items-center justify-center shrink-0 shadow-md shadow-violet-900/40">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                                </svg>
                            </div>
                            <div class="max-w-lg bg-zinc-800 text-zinc-100 border border-zinc-700/50 rounded-2xl rounded-bl-sm px-4 py-3 text-sm leading-relaxed shadow-sm bubble"
                                 th:text="${entry.content}"></div>
                        </div>

                    </th:block>
                </th:block>
            </th:block>

            </div>
        </div>

        <!-- Input -->
        <div th:if="${chat != null}" class="px-4 py-4 border-t border-zinc-800/80" style="background:#0c0c0f;">
            <form th:action="@{/chat/{chatId}/entry(chatId=${chat.id})}" method="post">
                <div class="flex items-end gap-3 bg-zinc-800/70 rounded-2xl px-4 py-3 border border-zinc-700/60 focus-within:border-violet-500/50 focus-within:ring-1 focus-within:ring-violet-500/20 transition-all">
                    <label for="chat-input" class="sr-only" th:text="#{chat.input.placeholder}">Message</label>
                    <textarea id="chat-input" name="prompt" th:placeholder="#{chat.input.placeholder}" required rows="1"
                              class="flex-1 bg-transparent text-zinc-100 placeholder-zinc-500 resize-none outline-none text-sm leading-relaxed" style="max-height:9rem;"></textarea>
                    <button type="button" id="send-button"
                            class="shrink-0 w-8 h-8 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 rounded-xl flex items-center justify-center transition-colors shadow-md shadow-violet-900/40 mb-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

    </main>
</div>


<script>
    let _pendingDeleteForm = null;

    function showDeleteModal(form) {
        _pendingDeleteForm = form;
        document.getElementById('confirmModal').classList.remove('hidden');
    }

    function confirmDelete() {
        if (_pendingDeleteForm) _pendingDeleteForm.submit();
    }

    function hideModal() {
        document.getElementById('confirmModal').classList.add('hidden');
        _pendingDeleteForm = null;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') hideModal();
    });
</script>

</body>
</html>
