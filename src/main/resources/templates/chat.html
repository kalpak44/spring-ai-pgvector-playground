<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${chat != null} ? 'AI Playground — ' + chat.title : 'AI Playground'">AI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/chat.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer th:src="@{/js/chat.js}"></script>
</head>
<body class="bg-zinc-950 h-screen overflow-hidden" style="font-family:'Outfit',sans-serif;">
<div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside class="w-64 flex flex-col shrink-0 border-r border-zinc-800/80" style="background:#0c0c0f;">

        <!-- Header / logo -->
        <div class="px-4 py-5 border-b border-zinc-800/80">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
                    </svg>
                </div>
                <span class="text-zinc-100 font-semibold tracking-tight text-sm" style="font-family:'JetBrains Mono',monospace;">AI Playground</span>
            </div>
        </div>

        <!-- Chat list -->
        <div class="flex-1 overflow-y-auto min-h-0 p-2 chat-scroll">
            <p class="px-2 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-widest mb-1" style="font-family:'JetBrains Mono',monospace;">Chats</p>
            <ul class="space-y-0.5">
                <li th:each="c : ${chats}"
                    th:class="${chat != null and chat.id != null and c.id == chat.id} ?
                        'flex items-center justify-between rounded-lg px-3 py-2.5 bg-violet-600/10 border border-violet-500/25 group cursor-pointer' :
                        'flex items-center justify-between rounded-lg px-3 py-2.5 hover:bg-zinc-800/60 border border-transparent group cursor-pointer transition-colors'">
                    <a th:href="@{/chat/{id}(id=${c.id})}"
                       class="flex-1 min-w-0 text-sm text-zinc-300 hover:text-zinc-100 truncate transition-colors">
                        <span th:text="${c.title}">Chat</span>
                    </a>
                    <form th:action="@{/chat/{id}/delete(id=${c.id})}" method="post"
                          onsubmit="return confirm('Delete this chat?');" class="shrink-0 ml-2">
                        <button type="submit"
                                class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition-all p-0.5 rounded">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                            </svg>
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- New chat form -->
        <div class="p-3 border-t border-zinc-800/80">
            <form action="/chat/new" method="post" class="flex flex-col gap-2">
                <input type="text" name="title" placeholder="New chat name..." required
                       class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
                <button type="submit"
                        class="flex items-center justify-center gap-1.5 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-violet-950/40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    New Chat
                </button>
            </form>
        </div>
    </aside>

    <!-- ── Main area ─────────────────────────────────────── -->
    <main class="flex-1 flex flex-col overflow-hidden bg-zinc-950">

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto px-6 py-6 chat-scroll" id="messages" style="display:flex;flex-direction:column;gap:1.25rem;">

            <!-- No chat selected -->
            <th:block th:if="${chat == null}">
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:5rem;text-align:center;">
                    <div class="w-14 h-14 rounded-2xl bg-zinc-800/80 border border-zinc-700/50 flex items-center justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                        </svg>
                    </div>
                    <p class="text-zinc-500 text-sm">Select a chat or create a new one to start.</p>
                </div>
            </th:block>

            <!-- History -->
            <th:block th:if="${chat != null}">
                <th:block th:if="${!#lists.isEmpty(chat.history)}">
                    <th:block th:each="entry : ${chat.history}">

                        <!-- User message -->
                        <div th:if="${entry.role.role eq 'user'}" class="flex items-end justify-end gap-2">
                            <div class="max-w-xl bg-violet-700 text-white rounded-2xl rounded-br-sm px-4 py-3 text-sm leading-relaxed shadow-md shadow-violet-950/50 bubble"
                                 th:text="${entry.content}"></div>
                            <div class="w-7 h-7 rounded-full bg-zinc-700 border border-zinc-600/60 flex items-center justify-center shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-zinc-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                                </svg>
                            </div>
                        </div>

                        <!-- AI message -->
                        <div th:unless="${entry.role.role eq 'user'}" class="flex items-end gap-2">
                            <div class="w-7 h-7 rounded-full bg-violet-600 flex items-center justify-center shrink-0 shadow-md shadow-violet-900/40">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                                </svg>
                            </div>
                            <div class="max-w-xl bg-zinc-800 text-zinc-100 border border-zinc-700/50 rounded-2xl rounded-bl-sm px-4 py-3 text-sm leading-relaxed shadow-sm bubble"
                                 th:text="${entry.content}"></div>
                        </div>

                    </th:block>
                </th:block>
            </th:block>
        </div>

        <!-- Input -->
        <div th:if="${chat != null}" class="px-4 py-4 border-t border-zinc-800/80" style="background:#0c0c0f;">
            <form th:action="@{/chat/{chatId}/entry(chatId=${chat.id})}" method="post">
                <div class="flex items-end gap-3 bg-zinc-800/70 rounded-2xl px-4 py-3 border border-zinc-700/60 focus-within:border-violet-500/50 focus-within:ring-1 focus-within:ring-violet-500/20 transition-all">
                    <label for="chat-input" class="sr-only">Message</label>
                    <textarea id="chat-input" name="prompt" placeholder="Ask anything..." required rows="1"
                              class="flex-1 bg-transparent text-zinc-100 placeholder-zinc-500 resize-none outline-none text-sm leading-relaxed" style="max-height:9rem;"></textarea>
                    <button type="button" id="send-button"
                            class="shrink-0 w-8 h-8 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 rounded-xl flex items-center justify-center transition-colors shadow-md shadow-violet-900/40 mb-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

    </main>
</div>
</body>
</html>
