<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">AI Assistant — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center" style="font-family:'Outfit',sans-serif;">

<div class="w-full max-w-sm mx-4">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
        <div class="w-9 h-9 rounded-xl bg-violet-600 flex items-center justify-center shadow-lg shadow-violet-900/50">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
            </svg>
        </div>
        <span class="text-zinc-100 font-semibold text-lg tracking-tight" style="font-family:'JetBrains Mono',monospace;">AI Assistant</span>
    </div>

    <!-- Card -->
    <div class="bg-zinc-900 border border-zinc-800/60 rounded-2xl p-6 shadow-2xl shadow-black/40">

        <h1 class="text-zinc-100 font-semibold text-base mb-5" th:text="#{login.heading}">Sign In</h1>

        <!-- Alerts -->
        <div th:if="${param.error}" class="mb-4 px-3 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm" th:text="#{login.error}"></div>
        <div th:if="${param.logout}" class="mb-4 px-3 py-2.5 rounded-lg bg-zinc-800 border border-zinc-700/50 text-zinc-400 text-sm" th:text="#{login.logout}"></div>
        <div th:if="${param.setup}" class="mb-4 px-3 py-2.5 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm" th:text="#{login.setup_done}"></div>
        <div th:if="${param.usernameChanged}" class="mb-4 px-3 py-2.5 rounded-lg bg-zinc-800 border border-zinc-700/50 text-zinc-400 text-sm" th:text="#{login.username_changed}"></div>

        <form th:action="@{/login}" method="post" class="flex flex-col gap-3">
            <div class="flex flex-col gap-1.5">
                <label for="username" class="text-xs font-medium text-zinc-400 uppercase tracking-widest" style="font-family:'JetBrains Mono',monospace;" th:text="#{login.label.username}">Username</label>
                <input id="username" name="username" type="text" required autofocus
                       class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
            </div>
            <div class="flex flex-col gap-1.5">
                <label for="password" class="text-xs font-medium text-zinc-400 uppercase tracking-widest" style="font-family:'JetBrains Mono',monospace;" th:text="#{login.label.password}">Password</label>
                <input id="password" name="password" type="password" required
                       class="w-full bg-zinc-800/80 border border-zinc-700/60 rounded-lg px-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
            </div>
            <button type="submit"
                    class="mt-1 w-full bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-violet-950/40"
                    th:text="#{login.button}">Sign in</button>
        </form>
    </div>
</div>

</body>
</html>
