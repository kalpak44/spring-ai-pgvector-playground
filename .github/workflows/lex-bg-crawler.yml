name: Crawl lex.bg laws

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      max_docs:
        description: 'Max documents to crawl across all categories (0 = all)'
        required: false
        default: '0'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/lex-bg-crawler/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts/lex-bg-crawler

      - name: Run crawler
        run: node index.js
        working-directory: scripts/lex-bg-crawler
        env:
          OUTPUT_DIR: ${{ github.workspace }}/crawlers-data/lex.bg
          MAX_DOCS: ${{ inputs.max_docs || '0' }}
          DELAY_MS: '1500'
          RECRAWL_DAYS: '7'

      - name: Commit crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawlers-data/lex.bg/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            count=$(git diff --staged --name-only | wc -l)
            git commit -m "crawl: update lex.bg laws ($count files)"
            git push
          fi