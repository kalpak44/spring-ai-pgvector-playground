<body class="bg-[#FAF9F5] dark:bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- ── Delete ticket confirm modal ───────────────────────────────────── -->
<div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="hideDeleteModal()"></div>
    <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
        <p class="text-zinc-900 dark:text-zinc-100 font-medium mb-2">Delete this ticket?</p>
        <p class="text-zinc-500 text-sm mb-6 line-clamp-2"></p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="hideDeleteModal()"
                    class="px-4 py-2 text-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">Cancel</button>
            <form method="post">
                <button type="submit"
                        class="bg-red-700 hover:bg-red-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">Delete Ticket</button>
            </form>
        </div>
    </div>
</div>

<!-- ── Comment delete confirm modal ──────────────────────────────────── -->
<div id="commentDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="hideCommentDeleteModal()"></div>
    <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
        <p class="text-zinc-900 dark:text-zinc-100 font-medium mb-6">Delete this comment?</p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="hideCommentDeleteModal()"
                    class="px-4 py-2 text-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">Cancel</button>
            <form id="commentDeleteForm" method="post">
                <input type="hidden"/>
                <button type="submit"
                        class="bg-red-700 hover:bg-red-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">Delete</button>
            </form>
        </div>
    </div>
</div>

<!-- ── Header ────────────────────────────────────────────────────────── -->
<header class="h-14 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-6 shrink-0 sticky top-0 z-20 bg-white dark:bg-[#0c0c0f]">
    <div class="flex items-center gap-3 min-w-0">
        <a
           class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-500 transition-colors shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
            <span class="text-sm truncate max-w-[140px]">Board</span>
        </a>
        <span class="text-zinc-500 shrink-0">/</span>
        <span class="text-zinc-500 text-sm truncate max-w-[120px]">Column</span>
        <span class="text-zinc-500 shrink-0">/</span>
        <span class="text-zinc-500 text-sm font-medium truncate">Ticket</span>
    </div>
    <div class="flex items-center gap-2 shrink-0">
        <div class="w-px h-4 bg-zinc-100 dark:bg-zinc-800 mx-1"></div>
        <span class="text-xs text-zinc-500 hidden sm:block">user</span>
        <form method="post">
            <button type="submit" class="text-zinc-500 hover:text-zinc-500 transition-colors p-1 rounded">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                </svg>
            </button>
        </form>
    </div>
</header>

<!-- ── Flash messages ─────────────────────────────────────────────────── -->
<div
     class="px-6 py-2.5 bg-red-50 dark:bg-red-500/10 border-b border-red-200 dark:border-red-500/20 flex items-center justify-between gap-3">
    <p class="text-red-600 dark:text-red-400 text-sm"></p>
    <button type="button" onclick="this.parentElement.remove()" class="text-red-500/70 hover:text-red-600 dark:hover:text-red-400 p-0.5 rounded shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>
<div
     id="successFlash"
     class="px-6 py-2.5 bg-green-500/10 border-b border-green-500/20 flex items-center justify-between gap-3">
    <p class="text-green-400 text-sm"></p>
    <button type="button" onclick="this.parentElement.remove()" class="text-green-400/60 hover:text-green-400 p-0.5 rounded shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<!-- ── Main content ───────────────────────────────────────────────────── -->
<main class="flex-1 w-full max-w-6xl mx-auto px-6 py-8 flex flex-col gap-10">

    <!-- ══ Card edit form ═══════════════════════════════════════════════ -->
    <form id="cardUpdateForm"
          method="post">

        <div class="flex flex-col lg:flex-row lg:items-stretch gap-8">

            <!-- ── Left: text fields ─────────────────────────────────── -->
            <div class="flex-1 min-w-0 flex flex-col gap-5">

                <!-- Title -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-zinc-500 uppercase tracking-widest"
                           style="font-family:'JetBrains Mono',monospace;">Title</label>
                    <input name="title" type="text" required maxlength="255"
                           class="w-full bg-transparent border-0 border-b border-zinc-200 dark:border-zinc-800 pb-2 text-xl text-zinc-900 dark:text-zinc-100 font-medium placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 transition-colors"/>
                </div>

                <!-- Description -->
                <div class="flex-1 flex flex-col gap-1.5">
                    <label class="text-xs text-zinc-500 uppercase tracking-widest"
                           style="font-family:'JetBrains Mono',monospace;">Description</label>
                    <textarea name="description" maxlength="10000"
                              class="flex-1 min-h-[160px] w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-300 dark:text-zinc-700 placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/20 transition-all resize-none"></textarea>
                </div>
            </div>

            <!-- ── Right: metadata sidebar ───────────────────────────── -->
            <div class="lg:w-68 xl:w-72 flex flex-col gap-4 shrink-0">

                <p class="text-xs text-zinc-500 uppercase tracking-widest hidden lg:block"
                   style="font-family:'JetBrains Mono',monospace;">Details</p>

                <!-- Priority -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-zinc-500">Priority</label>
                    <select name="priority"

<script>
    const BOARD_ID = /*[[${board.id}]]*/ 0;

    function showDeleteModal()        { document.getElementById('deleteModal').classList.remove('hidden'); }
    function hideDeleteModal()        { document.getElementById('deleteModal').classList.add('hidden'); }
    function hideCommentDeleteModal() { document.getElementById('commentDeleteModal').classList.add('hidden'); }

    function showCommentDeleteModal(actionUrl) {
        document.getElementById('commentDeleteForm').action = actionUrl;
        document.getElementById('commentDeleteModal').classList.remove('hidden');
    }

    function startEditComment(id) {
        document.getElementById('comment-text-' + id).classList.add('hidden');
        const form = document.getElementById('comment-edit-form-' + id);
        form.classList.remove('hidden');
        form.classList.add('flex');
        document.getElementById('comment-edit-content-' + id).focus();
    }

    function cancelEditComment(id) {
        document.getElementById('comment-text-' + id).classList.remove('hidden');
        const form = document.getElementById('comment-edit-form-' + id);
        form.classList.add('hidden');
        form.classList.remove('flex');
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            hideDeleteModal(); hideCommentDeleteModal();
            closeDropdown('assignee'); closeDropdown('watcher');
        }
    });

    // Auto-dismiss success flash after 3 s
    const sf = document.getElementById('successFlash');
    if (sf) setTimeout(() => sf.remove(), 3000);

    // ── User autocomplete (assignees / watchers) ─────────────────────────
    const _debounceTimers = {};

    function onUserInput(type, value) {
        clearTimeout(_debounceTimers[type]);
        _debounceTimers[type] = setTimeout(() => fetchUserResults(type, value.trim()), 250);
    }

    async function fetchUserResults(type, q) {
        if (q.length < 1) { closeDropdown(type); return; }
        try {
            const resp = await fetch(`/apps/boards/${BOARD_ID}/users/search?q=${encodeURIComponent(q)}`);
            if (!resp.ok) return;
            const users = await resp.json();
            const picked = getPickedIds(type);
            const filtered = users.filter(u => !picked.has(u.id));
            if (!filtered.length) { closeDropdown(type); return; }

            let dd = document.getElementById(type + 'DropdownPortal');
            if (!dd) {
                dd = document.createElement('div');
                dd.id = type + 'DropdownPortal';
                document.body.appendChild(dd);
            }
            const input = document.getElementById(type + 'Search');
            const rect = input.getBoundingClientRect();
            Object.assign(dd.style, {
                display: 'block', position: 'fixed', zIndex: '9999',
                top: (rect.bottom + 4) + 'px', left: rect.left + 'px', width: rect.width + 'px',
                maxHeight: '13rem', overflowY: 'auto', scrollbarWidth: 'thin',
                background: 'var(--dd-bg)', border: '1px solid var(--dd-border)',
                borderRadius: '0.75rem', boxShadow: '0 25px 50px -12px rgba(0,0,0,.8)'
            });
            dd.innerHTML = filtered.map(u =>
                `<button type="button" onclick="pickUser('${type}', ${u.id}, '${escHtml(u.displayName)}')"
                    style="display:block;width:100%;text-align:left;padding:8px 12px;font-size:14px;color:var(--dd-text);background:transparent;border:none;cursor:pointer;"
                    onmouseover="this.style.background='var(--dd-hover)'" onmouseout="this.style.background='transparent'">${escHtml(u.displayName)}</button>`
            ).join('');
        } catch (_) {}
    }

    function pickUser(type, id, displayName) {
        const chips = document.getElementById(type + 'Chips');
        const isWatcher = type === 'watcher';
        const chip = document.createElement('span');
        chip.className = isWatcher
            ? 'inline-flex items-center gap-1.5 bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600/60 text-zinc-500 text-xs px-2.5 py-1 rounded-full'
            : 'inline-flex items-center gap-1.5 bg-violet-100 dark:bg-violet-600/20 border border-violet-300 dark:border-violet-500/30 text-violet-700 dark:text-violet-300 text-xs px-2.5 py-1 rounded-full';
        chip.dataset.userId = id;
        const btnColor = isWatcher ? 'text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100' : 'text-violet-600 dark:text-violet-400 hover:text-violet-800 dark:hover:text-violet-200';
        chip.innerHTML = `${escHtml(displayName)}<button type="button" onclick="removeUser('${type}', this)" class="${btnColor} transition-colors leading-none ml-1">&times;</button>`;
        chips.appendChild(chip);
        const hidden = document.createElement('input');
        hidden.type = 'hidden';
        hidden.name = type + 'Ids';
        hidden.value = id;
        hidden.dataset.userId = id;
        chips.appendChild(hidden);
        document.getElementById(type + 'Search').value = '';
        closeDropdown(type);
    }

    function removeUser(type, btn) {
        const chip = btn.closest('[data-user-id]');
        const userId = chip.dataset.userId;
        const chips = document.getElementById(type + 'Chips');
        chip.remove();
        const hidden = chips.querySelector(`input[data-user-id="${userId}"]`);
        if (hidden) hidden.remove();
    }

    function closeDropdown(type) {
        const portal = document.getElementById(type + 'DropdownPortal');
        if (portal) portal.style.display = 'none';
    }

    function getPickedIds(type) {
        const chips = document.getElementById(type + 'Chips');
        return new Set(Array.from(chips.querySelectorAll('[data-user-id]'))
            .map(el => +el.dataset.userId));
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('click', e => {
        ['assignee', 'watcher'].forEach(type => {
            const wrapper = document.getElementById(type + 'SearchWrapper');
            const portal = document.getElementById(type + 'DropdownPortal');
            if (wrapper && !wrapper.contains(e.target) && !(portal && portal.contains(e.target))) {
                closeDropdown(type);
            }
        });
    });
</script>

<script>
    const BADGE_BASE = 'self-start inline-flex items-center text-[10px] px-2 py-0.5 rounded-full border mt-1 ';
    function updateDaysLeftChip() {
        const input = document.querySelector('input[name="deadline"]');
        const chip = document.getElementById('daysLeftChip');
        if (!input || !input.value) { chip.classList.add('hidden'); return; }
        const days = Math.ceil((new Date(input.value) - new Date().setHours(0,0,0,0)) / 86400000);
        chip.classList.remove('hidden');
        if (days < 0) {
            chip.className = 'self-start inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full mt-1 bg-red-100 dark:bg-red-500/15 text-red-800 dark:text-red-300';
            chip.textContent = Math.abs(days) + (Math.abs(days) === 1 ? ' day overdue' : ' days overdue');
        } else if (days <= 3) {
            chip.className = 'self-start inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full mt-1 bg-amber-100 dark:bg-amber-500/15 text-amber-800 dark:text-amber-300';
            chip.innerHTML = '&#128276; ' + (days === 0 ? 'Due today' : days + (days === 1 ? ' day left' : ' days left'));
        } else {
            chip.className = 'self-start inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded-full mt-1 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400';
            chip.textContent = days + ' days left';
        }
    }
    document.querySelector('input[name="deadline"]').addEventListener('change', updateDaysLeftChip);
    updateDaysLeftChip();

    function updateClientTypeBadge() {
        const sel = document.getElementById('clientTypeSelect');
        const badge = document.getElementById('clientTypeBadge');
        const opt = sel.options[sel.selectedIndex];
        if (!opt.value) { badge.classList.add('hidden'); return; }
        badge.className = BADGE_BASE + opt.dataset.badge;
        badge.textContent = opt.textContent;
    }
</script>
