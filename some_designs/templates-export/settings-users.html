<body class="bg-[#FAF9F5] dark:bg-zinc-950 min-h-screen flex flex-col" style="font-family:'Outfit',sans-serif;">

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideDeleteModal()"></div>
    <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <h3 class="text-zinc-900 dark:text-zinc-100 font-medium mb-1.5">Delete user?</h3>
        <p class="text-zinc-500 text-sm mb-5">This action cannot be undone.</p>
        <div class="flex gap-3 justify-end">
            <button type="button" onclick="hideDeleteModal()"
                    class="px-4 py-2 text-sm text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 transition-colors">Cancel</button>
            <button type="button" onclick="confirmDelete()"
                    class="bg-red-600 hover:bg-red-500 active:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors shadow-md shadow-red-200/60 dark:shadow-red-950/40">Confirm</button>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div id="createModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideCreateModal()"></div>
    <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
        <h3 class="text-zinc-900 dark:text-zinc-100 font-medium mb-5">Create User</h3>
        <div id="createError" class="hidden mb-4 px-3 py-2.5 rounded-lg bg-red-100 dark:bg-red-500/10 border border-red-300 dark:border-red-500/30 text-red-600 dark:text-red-400 text-sm"></div>
        <form id="createForm" method="post" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-zinc-500 dark:text-zinc-400">Username</label>
                <input id="createUsername" name="username" type="text" required placeholder="jane.smith"
                       class="w-full bg-zinc-100 dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600 focus:outline-none focus:border-violet-300 dark:focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all"/>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-zinc-500 dark:text-zinc-400">Role</label>
                <select name="role"
                        class="w-full bg-zinc-100 dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/60 rounded-lg px-3 py-2 text-sm text-zinc-900 dark:text-zinc-100 focus:outline-none focus:border-violet-300 dark:focus:border-violet-500/60 focus:ring-1 focus:ring-violet-500/25 transition-all">
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="flex gap-3 justify-end pt-1">
                <button type="button" onclick="hideCreateModal()"
                        class="px-4 py-2 text-sm text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 transition-colors">Cancel</button>
                <button type="submit"
                        class="bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors shadow-md shadow-violet-200/60 dark:shadow-violet-950/40">Create</button>
            </div>
        </form>
    </div>
</div>

<!-- Header -->
<header class="h-14 border-b border-zinc-200 dark:border-zinc-800/80 flex items-center px-6 gap-4 shrink-0 bg-white dark:bg-[#0c0c0f]">
    <a href="/settings" class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        <span class="text-sm">Back to Settings</span>
    </a>
    <span class="text-zinc-400 dark:text-zinc-700">|</span>
    <span class="text-zinc-700 dark:text-zinc-300 text-sm font-medium">Users</span>
</header>

<script>
    const LABEL_DELETE = /*[[#{settings.button.delete}]]*/ 'Delete';

    // ── Delete modal ────────────────────────────────────────
    let pendingDeleteAction = null;

    function showDeleteModal(btn) {
        pendingDeleteAction = btn ? btn.dataset.action : null;
        document.getElementById('deleteModal').classList.remove('hidden');
    }

    function hideDeleteModal() {
        document.getElementById('deleteModal').classList.add('hidden');
        pendingDeleteAction = null;
    }

    function confirmDelete() {
        const form = document.getElementById('usersForm');
        form.action = pendingDeleteAction || /*[[@{/settings/users/delete}]]*/ '/settings/users/delete';
        hideDeleteModal();
        form.submit();
    }

    // ── Create modal ────────────────────────────────────────
    function showCreateModal() {
        document.getElementById('createModal').classList.remove('hidden');
        setTimeout(() => document.getElementById('createUsername').focus(), 50);
    }

    function hideCreateModal() {
        document.getElementById('createModal').classList.add('hidden');
        document.getElementById('createForm').reset();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { hideDeleteModal(); hideCreateModal(); }
    });

    // ── Real-time search ────────────────────────────────────
    let searchTimer;
    function debounceSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => document.getElementById('searchForm').submit(), 350);
    }

    // ── Bulk selection ──────────────────────────────────────
    function updateSelection() {
        const checked = document.querySelectorAll('.row-check:checked');
        const all = document.querySelectorAll('.row-check');
        const selectAll = document.getElementById('selectAll');
        const deleteBtn = document.getElementById('deleteBtn');
        const n = checked.length;

        selectAll.indeterminate = n > 0 && n < all.length;
        selectAll.checked = all.length > 0 && n === all.length;

        deleteBtn.disabled = n === 0;
        document.getElementById('deleteLabel').textContent = n > 0 ? `${LABEL_DELETE} (${n})` : LABEL_DELETE;
    }

    function toggleAll(cb) {
        document.querySelectorAll('.row-check').forEach(el => { el.checked = cb.checked; });
        updateSelection();
    }

    // ── Clipboard helpers ───────────────────────────────────
    function copyInviteToken(btn) {
        const link = window.location.origin + '/invite/' + btn.dataset.token;
        navigator.clipboard.writeText(link).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>';
            setTimeout(() => { btn.innerHTML = original; }, 1500);
        });
    }

    function copyLink(inputId, btn) {
        navigator.clipboard.writeText(document.getElementById(inputId).value).then(() => {
            const orig = btn.textContent.trim();
            btn.textContent = 'Copied!';
            btn.classList.add('text-emerald-600 dark:text-emerald-400');
            setTimeout(() => {
                btn.textContent = orig;
                btn.classList.remove('text-emerald-600 dark:text-emerald-400');
            }, 1500);
        });
    }
</script>
